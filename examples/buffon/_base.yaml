# Shared parameters for all buffon-graph examples.
# Variants below add `defaults: ../_base.yaml` and override only what they need.

graph_path: buffon.json
graph_mode: open
inner_total_length: 2500.0

dielectric_mode: refraction_params
dielectric_method: uniform
dielectric_inner_value: 1.5
dielectric_loss: 0.001
dielectric_outer_value: 1.5
edge_size: 10.0

noise_level: 0.0
k_a: 10.68
gamma_perp: 0.5
keep_degree_two: true

n_workers: 80
k_n: 8000
k_min: 10.35
k_max: 11.0
alpha_n: 500
alpha_min: 0.006
alpha_max: 0.015
quality_threshold: 1.0e-6
search_stepsize: 1.0e-6
max_steps: 10000
max_tries_reduction: 50
reduction_factor: 0.8

D0_max: 0.01
D0_steps: 101
intensities_D0_max: 0.01

plot_passive_n_modes: 10
plot_passive_edge_size: 1.0
plot_threshold_n_modes: 10
plot_threshold_edge_size: 1.0
